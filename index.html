  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #2d6a4f;
      --accent-dark: #1b4332;
      --bg: #f8f9fb;
      --card: #ffffff;
      --text: #1a1a2e;
      --muted: #5a6376;
      --border: #e2e6f0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* ── Language toggle ── */
    #lang-toggle {
      position: fixed;
      top: 1rem;
      right: 1.25rem;
      z-index: 100;
      display: flex;
      flex-wrap: wrap;
      gap: 0.2rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.2rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      max-width: 220px;
    }
    #lang-toggle button {
      border: none;
      background: transparent;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      transition: background .15s, color .15s;
    }
    #lang-toggle button.active {
      background: var(--accent);
      color: #fff;
    }

    /* ── Hero ── */
    header {
      background: linear-gradient(135deg, #1b4332 0%, #2d6a4f 100%);
      color: #fff;
      text-align: center;
      padding: 5rem 1.5rem 4rem;
    }
    .app-icon {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      margin-bottom: 1.25rem;
      box-shadow: 0 4px 20px rgba(0,0,0,.3);
      object-fit: cover;
    }
    header h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 0.75rem; }
    header p  { font-size: 1.1rem; opacity: .88; max-width: 560px; margin: 0 auto 2rem; }

    .badge-row { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; }
    .play-badge { display: inline-block; border-radius: 8px; transition: transform .15s, box-shadow .15s; }
    .play-badge:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.2); }
    .play-badge img { height: 60px; display: block; }

    /* ── Main ── */
    main { max-width: 960px; margin: 0 auto; padding: 3rem 1.5rem; }

    /* ── Features ── */
    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: var(--text);
    }
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
      margin-bottom: 3.5rem;
    }
    .feature-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.25rem 1rem;
    }
    .feature-icon { font-size: 1.75rem; margin-bottom: 0.5rem; }
    .feature-card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.3rem; }
    .feature-card p  { font-size: 0.9rem; color: var(--muted); }

    /* ── Screenshots ── */
    .screenshots-section { margin-bottom: 3.5rem; }
    .screenshots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem;
    }
    .feature-graphic-item { grid-column: span 4; }
    .feature-graphic-item img { width: 100%; height: auto; border-radius: 16px; }
    .screenshot-item { text-align: center; }
    .screenshot-item img {
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.12);
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }
    .screenshot-item img:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,.18);
    }
    .screenshot-item p {
      margin-top: 0.5rem;
      font-size: 0.82rem;
      color: var(--muted);
    }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.85);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-height: 90vh;
      max-width: 90vw;
      border-radius: 12px;
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
    }
    #lightbox-close {
      position: absolute;
      top: 1rem; right: 1.25rem;
      background: rgba(255,255,255,.15);
      border: none;
      color: #fff;
      font-size: 1.5rem;
      width: 2.5rem; height: 2.5rem;
      border-radius: 50%;
      cursor: pointer;
      line-height: 1;
    }

    /* ── Info row ── */
    .info-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 3.5rem;
    }
    .info-chip {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.4rem 1rem;
      font-size: 0.9rem;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .info-chip strong { color: var(--text); }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 2rem 1.5rem;
      font-size: 0.88rem;
      color: var(--muted);
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      header h1 { font-size: 1.7rem; }
      .features { grid-template-columns: 1fr; }
      .screenshots-grid { grid-template-columns: repeat(3, 1fr); }

       target="_blank" rel="noopener">GitHub</a>
  </p>
</footer>

<script>
  const langs = ['de','en','fr','it','nl','pl','tr'];

  const badgeAlt = {
    de: 'Jetzt bei Google Play', en: 'Get it on Google Play',
    fr: 'Disponible sur Google Play', it: 'Disponibile su Google Play',
    nl: 'Verkrijgbaar op Google Play', pl: 'Pobierz z Google Play',
    tr: "Google Play'den İndir"
  };

  function setLang(lang) {
    document.documentElement.lang = lang;
    document.querySelectorAll('.i18n').forEach(el => {
      const val = el.dataset[lang];
      if (val !== undefined) el.textContent = val;
    });
    langs.forEach(l =>
      document.getElementById('btn-' + l).classList.toggle('active', l === lang)
    );
    const badge = document.getElementById('play-badge-img');
    if (badge) {
      badge.src = `https://play.google.com/intl/${lang}_us/badges/static/images/badges/${lang}_badge_web_generic.png`;
      badge.alt = badgeAlt[lang] || badgeAlt.en;
    }
  }

  function openLightbox(img) {
    document.getElementById('lightbox-img').src = img.src;
    document.getElementById('lightbox').classList.add('open');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
  });

  setLang('de');
</script>

</body>
</html>
